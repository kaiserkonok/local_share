<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalShare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2rem;
            color: #fff;
            font-weight: 600;
        }

        header p {
            color: #888;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .drop-zone {
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #161616;
            margin-bottom: 24px;
        }

        .drop-zone:hover {
            border-color: #555;
            background: #1a1a1a;
        }

        .drop-zone.active {
            border-color: #4ade80;
            background: #0a1a0a;
        }

        .drop-zone-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .drop-zone h3 {
            color: #ccc;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .drop-zone p {
            color: #666;
            font-size: 0.85rem;
        }

        .btn-browse {
            display: inline-block;
            margin-top: 14px;
            padding: 10px 24px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-browse:hover {
            background: #e0e0e0;
        }

        #file-input {
            display: none;
        }

        .progress-section {
            margin-bottom: 24px;
        }

        .progress-item {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 10px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .progress-name {
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        .progress-status {
            color: #4ade80;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: #2a2a2a;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .file-list-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .file-count {
            color: #666;
            font-size: 0.85rem;
        }

        .btn-refresh {
            background: none;
            border: 1px solid #333;
            color: #888;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-refresh:hover {
            border-color: #555;
            color: #fff;
        }

        .file-list {
            background: #161616;
            border-radius: 14px;
            overflow: hidden;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid #1e1e1e;
            transition: background 0.15s;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #1c1c1c;
        }

        .file-icon {
            width: 40px;
            height: 40px;
            background: #1e1e1e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            color: #ddd;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            color: #666;
            font-size: 0.8rem;
            margin-top: 2px;
        }

        .file-actions {
            display: flex;
            gap: 6px;
            margin-left: 12px;
        }

        .btn-action {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-action:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .btn-action.delete:hover {
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #555;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #22c55e;
            color: #000;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            header {
                padding: 20px 0;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .drop-zone {
                padding: 35px 20px;
            }

            .drop-zone-icon {
                font-size: 2.5rem;
            }

            .file-item {
                padding: 12px 14px;
            }

            .file-icon {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LocalShare</h1>
            <p>Share files across devices on your network</p>
        </header>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📁</div>
            <h3>Drop files here</h3>
            <p>or click to browse</p>
            <button class="btn-browse" id="browseBtn">Select Files</button>
            <input type="file" id="file-input" multiple>
        </div>

        <div class="progress-section" id="progressSection" style="display: none;"></div>

        <div class="file-list-header">
            <h2>Files <span class="file-count" id="fileCount"></span></h2>
            <button class="btn-refresh" id="refreshBtn">Refresh</button>
        </div>

        <div class="file-list" id="fileList">
            <div class="empty-state">
                <p>No files shared yet</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('file-input');
        const browseBtn = document.getElementById('browseBtn');
        const fileList = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const progressSection = document.getElementById('progressSection');
        const refreshBtn = document.getElementById('refreshBtn');
        const toast = document.getElementById('toast');

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📄', doc: '📄', docx: '📄',
                jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼', svg: '🖼', webp: '🖼',
                mp4: '🎬', mkv: '🎬', avi: '🎬', mov: '🎬',
                mp3: '🎵', wav: '🎵', flac: '🎵', aac: '🎵',
                zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
                py: '🐍', js: '📜', ts: '📜', html: '🌐', css: '🎨',
                txt: '📝', md: '📝',
            };
            return icons[ext] || '📄';
        }

        function formatSize(bytes) {
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let i = 0;
            while (bytes >= 1024 && i < units.length - 1) {
                bytes /= 1024;
                i++;
            }
            return `${bytes.toFixed(1)} ${units[i]}`;
        }

        // Drop zone events
        ['dragenter', 'dragover'].forEach(e => {
            dropZone.addEventListener(e, (ev) => {
                ev.preventDefault();
                dropZone.classList.add('active');
            });
        });

        ['dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, (ev) => {
                ev.preventDefault();
                dropZone.classList.remove('active');
            });
        });

        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) uploadFiles(files);
        });

        browseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                uploadFiles(fileInput.files);
                fileInput.value = '';
            }
        });

        async function uploadFiles(files) {
            progressSection.style.display = 'block';
            progressSection.innerHTML = '';

            for (const file of files) {
                const id = 'p-' + Math.random().toString(36).slice(2, 8);
                progressSection.innerHTML += `
                    <div class="progress-item" id="${id}">
                        <div class="progress-header">
                            <span class="progress-name">${file.name}</span>
                            <span class="progress-status">Uploading...</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar" id="${id}-bar"></div>
                        </div>
                    </div>
                `;
            }

            const formData = new FormData();
            for (const file of files) {
                formData.append('files', file);
            }

            try {
                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const pct = Math.round((e.loaded / e.total) * 100);
                        for (const file of files) {
                            const bar = document.getElementById(`p-${file.name}-bar`);
                            if (bar) bar.style.width = pct + '%';
                        }
                    }
                });

                xhr.onload = () => {
                    const data = JSON.parse(xhr.responseText);
                    showToast(`Uploaded ${data.count} file(s)`);
                    loadFiles();
                    setTimeout(() => progressSection.style.display = 'none', 1500);
                };

                xhr.onerror = () => {
                    showToast('Upload failed');
                    progressSection.style.display = 'none';
                };

                xhr.open('POST', '/api/upload');
                xhr.send(formData);
            } catch (err) {
                showToast('Upload failed');
                progressSection.style.display = 'none';
            }
        }

        async function loadFiles() {
            try {
                const res = await fetch('/api/files');
                const data = await res.json();
                renderFiles(data.files);
            } catch (err) {
                console.error('Failed to load files', err);
            }
        }

        function renderFiles(files) {
            fileCount.textContent = files.length > 0 ? `(${files.length})` : '';

            if (files.length === 0) {
                fileList.innerHTML = '<div class="empty-state"><p>No files shared yet</p></div>';
                return;
            }

            fileList.innerHTML = files.map(f => `
                <div class="file-item">
                    <div class="file-icon">${getFileIcon(f.name)}</div>
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${f.sizeFormatted}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn-action" title="Download" onclick="downloadFile('${f.name}')">⬇</button>
                        <button class="btn-action delete" title="Delete" onclick="deleteFile('${f.name}')">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function downloadFile(name) {
            window.location.href = '/api/download/' + encodeURIComponent(name);
        }

        async function deleteFile(name) {
            if (!confirm(`Delete "${name}"?`)) return;
            try {
                await fetch('/api/delete/' + encodeURIComponent(name), { method: 'DELETE' });
                showToast('Deleted');
                loadFiles();
            } catch (err) {
                showToast('Delete failed');
            }
        }

        refreshBtn.addEventListener('click', loadFiles);

        // Auto-refresh every 3 seconds
        setInterval(loadFiles, 3000);

        loadFiles();
    </script>
</body>
</html>
